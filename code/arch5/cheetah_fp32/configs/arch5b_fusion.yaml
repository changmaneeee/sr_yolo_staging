# Architecture 5-B: Feature Fusion Pipeline (주력 아키텍처)

defaults:
  - ../default.yaml

data:
  hr_root: "/home/changmin/smart_airbus_data"
  hr_val_images: "/home/changmin/smart_airbus_data/images/val"
  hr_val_labels: "/home/changmin/smart_airbus_data/labels/val"
    
  lr_root: "/home/changmin/smart_airbus_data_lr"
  lr_val_images: "/home/changmin/smart_airbus_data_lr/images/val"
  lr_val_labels: "/home/changmin/smart_airbus_data_lr/labels/val"
    
  scale_factor: 4

experiment:
  name: "arch5b_feature_fusion"
  description: "Multi-scale feature fusion between SR and Detection"
  architecture: "arch5b"
  tags: ["main", "fusion", "best_performance"]

model:
  pipeline: "arch5b_fusion"
  sr_model: "rfdn"
  detector: "yolov8n"
  fusion_method: "attention"

  # ★★★ Weights 경로 명시 ★★★
  weights:
    sr_model: "weights/rfdn/model_best.pt"
    detector: "weights/yolohr/8s/best.pt"

  # ★★★ SR 설정 (0-255 범위) ★★★
  sr_config:
    input_range: "0-255"
    nf: 50
    scale: 4

  # Feature Fusion 설정
  arch5b:
    fusion_layers:
      - sr_layer: "encoder.stage2"
        det_layer: "backbone.dark2"
        fusion_dim: 128

      - sr_layer: "encoder.stage3"
        det_layer: "backbone.dark3"
        fusion_dim: 256

      - sr_layer: "encoder.stage4"
        det_layer: "backbone.dark4"
        fusion_dim: 512

    fusion_module:
      type: "cross_attention"
      num_heads: 8
      dropout: 0.1
      use_residual: true

    align_features: true
    alignment_method: "conv1x1"
    use_sr_decoder: true
    sr_decoder_weight: 0.3

training:
  epochs: 350
  batch_size: 8
  lr: 1.0e-4

  phases:
    - name: "pretrain_sr"
      epochs: 50
      freeze_detector: true
      freeze_fusion: true
      loss_weights:
        sr_alpha: 1.0
        det_beta: 0.0
        fusion_reg: 0.0

    - name: "pretrain_detector"
      epochs: 50
      freeze_sr: true
      freeze_fusion: true
      loss_weights:
        sr_alpha: 0.0
        det_beta: 1.0
        fusion_reg: 0.0

    - name: "joint_fusion"
      epochs: 200
      freeze_sr: false
      freeze_detector: false
      freeze_fusion: false
      loss_weights:
        sr_alpha: 0.3
        det_beta: 0.5
        fusion_reg: 0.2

    - name: "finetune"
      epochs: 50
      freeze_sr: false
      freeze_detector: false
      freeze_fusion: true
      loss_weights:
        sr_alpha: 0.2
        det_beta: 0.8
        fusion_reg: 0.0

losses:
  sr_loss:
    type: "charbonnier"
    weight: 0.3

  detection_loss:
    box_weight: 0.05
    cls_weight: 0.5
    dfl_weight: 1.5

  feature_matching:
    type: "cosine"
    weight: 0.2
    layers: ["stage2", "stage3", "stage4"]

  perceptual_loss:
    use: true
    weight: 0.1
    layers: ["relu2_2", "relu3_3", "relu4_3"]

optimizer:
  type: "AdamW"
  lr: 1.0e-4
  weight_decay: 0.01

  param_groups:
    - modules: ["sr_model"]
      lr: 5.0e-5

    - modules: ["detector"]
      lr: 1.0e-4

    - modules: ["fusion"]
      lr: 2.0e-4

scheduler:
  type: "CosineAnnealing"
  T_max: 350
  eta_min: 1.0e-6
  warmup_epochs: 20

data:
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    rotate_90: true
    random_crop: true
    color_jitter: true
    mosaic: true
    mixup: true
    cutmix: false

evaluation:
  metrics:
    - "mAP@0.5"
    - "mAP@0.5:0.95"
    - "mAP@0.75"
    - "Precision"
    - "Recall"
    - "F1"
    - "PSNR"
    - "SSIM"

  analyze_fusion: true
  fusion_analysis:
    visualize_attention_maps: true
    save_feature_maps: true
    measure_feature_similarity: true

  val_interval: 5
  save_best: true
  save_last: true

visualization:
  save_sr_outputs: true
  save_detection_results: true
  save_attention_maps: true
  num_samples: 8

expected_performance:
  pros:
    - "최고 detection 성능 (feature fusion)"
    - "Multi-scale 정보 활용"
    - "SR과 Detection의 상호보완"
    - "End-to-end 최적화"

  cons:
    - "학습 복잡도 높음"
    - "메모리 사용량 큼"
    - "Hyperparameter 튜닝 필요"

  target_metrics:
    mAP_05: 0.75
    mAP_05_095: 0.55
    recall: 0.80
    precision: 0.75
    psnr: 28.0
    latency_ms: 100
    memory_mb: 3000

hardware:
  use_amp: true
  use_tensorrt: false
  optimize_for_inference: false

