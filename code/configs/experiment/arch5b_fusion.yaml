# =============================================================================
# Arch5B Feature Fusion Configuration
# -----------------------------------------------------------------------------
# 목적:
# - 현재 repo의 Arch5B 구현(arch5b_fusion.py)에 실제로 맞는 canonical config
# - 학습되지 않은 fusion이 detector baseline을 망치지 않도록 identity-safe init 사용
# - smoke / full6418 direct eval에서 바로 사용할 수 있도록 데이터 경로를 포함
# =============================================================================

data:
  hr_root: "/home/changmin/smart_airbus_data"
  hr_val_images: "images/val"
  hr_val_labels: "labels/val"

  lr_root: "/home/changmin/smart_airbus_data_lr"
  lr_val_images: "images/val"
  lr_val_labels: "labels/val"

  upscale_factor: 4

experiment:
  name: "arch5b_feature_fusion"
  architecture: "arch5b"
  description: "SR feature + YOLO feature multi-scale fusion"

model:
  pipeline: "arch5b_fusion"
  detector_input: "sr"

  sr:
    type: "rfdn"
    weights: "/home/changmin/dark_vessel_sr_yolo/weights/rfdn/model_best.pt"
    rfdn:
      nf: 50
      num_modules: 4

  yolo:
    # Arch0/Arch2 비교선과 가장 가까운 detector baseline
    weights_path: "/home/changmin/dark_vessel_sr_yolo/weights/yolo_8s_rfdn/best.pt"
    num_classes: 1
    imgsz: 640

  fusion:
    use_cross_attention: true
    use_cbam: true
    num_heads: 4
    init_mode: "identity"

training:
  sr_weight: 0.3
  det_weight: 1.0

evaluation:
  conf_threshold: 0.25
  iou_threshold: 0.50
  max_det: 300

logging:
  save_dir: "iac_runs/arch5b_eval"
