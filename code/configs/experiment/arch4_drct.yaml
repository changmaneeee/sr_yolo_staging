# =============================================================================
# Arch4 DRCT Configuration
# - SR: DRCT (RFDN 대신)
# - Scout: LR YOLO (기존과 동일)
# - Sniper: DRCT SR crop용 YOLO (학습 후 교체)
# - 용도: Sniper dataset 생성 + 평가
# =============================================================================

data:
  hr_root: "/home/changmin/smart_airbus_data"
  hr_val_images: "images/val"
  hr_val_labels: "labels/val"

  lr_root: "/home/changmin/smart_airbus_data_lr"
  lr_val_images: "images/val"

  upscale_factor: 4

model:
  sr:
    type: "drct"
    weights: "/home/changmin/dark_vessel_sr_yolo/weights/sr_finetuned/drct/best.pt"

  yolo:
    weights_lr: "/home/changmin/yolov8s+airbus_smartdata/weights/best.pt"
    weights_hr: "/home/changmin/dark_vessel_sr_yolo/runs/detect/runs/yolo_chain/yolo_sniper_drct_v3/weights/best.pt"
    classes: 1

  arch4:
    pass1_conf: 0.0075
    high_conf: 0.45
    sniper_conf: 0.001
    final_conf: 0.25
    merge_iou: 0.50

    roi_expansion: 1.75
    crop_size_lr: 64
    batch_size_sr: 32

    scout_nms_iou: 0.50
    roi_merge_iou: 0.30
    roi_center_ratio: 0.35
    sniper_nms_iou: 0.45
    final_nms_iou: 0.50
    drop_uncertain_if_sniper_hits: true
    sniper_score_bonus: 0.0

logging:
  save_dir: "results/arch4_drct"
