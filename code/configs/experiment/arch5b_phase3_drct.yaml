# =============================================================================
# Arch5B Phase 3 DRCT — Joint Full Training Config
# 변경: YOLO weight → DRCT-trained YOLO (detector matching rule 적용)
# =============================================================================

data:
  hr_root: "/home/changmin/smart_airbus_data"
  hr_val_images: "images/val"
  hr_val_labels: "labels/val"
  lr_root: "/home/changmin/smart_airbus_data_lr"
  lr_val_images: "images/val"
  lr_val_labels: "labels/val"
  upscale_factor: 4

model:
  pipeline: arch5b_fusion
  sr_type: drct
  detector_input: "sr"

  sr:
    type: drct
    weights: "/home/changmin/dark_vessel_sr_yolo/weights/sr_finetuned/drct/best.pt"
    drct:
      variant: base
      pretrain_path: "/home/changmin/dark_vessel_sr_yolo/weights/sr_finetuned/drct/best.pt"

  yolo:
    weights_path: "/home/changmin/dark_vessel_sr_yolo/weights/yolo_8s_drct/weights/best.pt"
    num_classes: 1
    imgsz: 640

  fusion:
    use_cross_attention: true
    use_cbam: true
    num_heads: 4
    init_mode: "identity"

training:
  sr_weight: 0.3
  det_weight: 1.0
  phase: 3
  freeze: "none"

evaluation:
  conf_threshold: 0.25
  iou_threshold: 0.50
  max_det: 300

logging:
  save_dir: "iac_lab/runs/arch5b_phase3_drct"
